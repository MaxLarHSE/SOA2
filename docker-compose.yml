version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: mypassword
      POSTGRES_DB: marketplace
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U myuser -d marketplace"]
      interval: 5s
      timeout: 5s
      retries: 5

  flyway:
    image: flyway/flyway:9-alpine
    depends_on:
      db:
        condition: service_healthy
    command: -url=jdbc:postgresql://db:5432/marketplace -user=myuser -password=mypassword migrate
    volumes:
      - ./migrations:/flyway/sql

  api-server:
    build: .             # Говорит Docker Compose искать Dockerfile в текущей папке
    ports:
      - "8080:8080"      # Пробрасываем порт на хост-машину
    environment:
      # Передаем строку подключения. Обрати внимание: хост здесь "db", а не "localhost"
      DATABASE_URL: "postgres://myuser:mypassword@db:5432/marketplace?sslmode=disable"
    depends_on:
      flyway:
        condition: service_completed_successfully # Ждем, пока Flyway накатит миграции и завершит работу!